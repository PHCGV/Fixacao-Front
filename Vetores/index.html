<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atividade de fixação - Arrays</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="script.js"></script>
</head>
<body class="bg-slate-100 text-slate-800 font-sans min-h-screen p-4 md:p-8">

    <div class="max-w-6xl mx-auto">
        
        <header class="mb-8 text-center md:text-left">
            <h1 class="text-3xl md:text-4xl font-extrabold text-indigo-900 mb-2">Sistema de Cadastro de Alunos</h1>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
            
            <div class="lg:col-span-5 space-y-6">
                
                <section class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
                    <h2 class="text-xl font-bold mb-4 flex items-center text-slate-800">
                        <span class="bg-green-100 text-green-700 px-2 py-1 rounded text-sm mr-2">1</span> 
                        Adicionar Aluno
                    </h2>
                    <div class="space-y-3">
                        <input type="text" id="nome" placeholder="Nome do Aluno" class="w-full p-3 border border-slate-300 rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none">
                        <div class="grid grid-cols-2 gap-3">
                            <input type="text" id="curso" placeholder="Curso (Ex: Engenharia de Software)" class="w-full p-3 border border-slate-300 rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none">
                            <input type="number" id="semestre" placeholder="Semestre (Ex: 6)" class="w-full p-3 border border-slate-300 rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none">
                        </div>
                        
                        <div class="flex gap-2 pt-2">
                            <button onclick="adicionarFim()" class="flex-1 bg-green-600 hover:bg-green-700 text-white font-semibold py-2 px-4 rounded-lg transition-colors text-sm">
                                + Fim (push)
                            </button>
                            <button onclick="adicionarInicio()" class="flex-1 bg-green-500 hover:bg-green-600 text-white font-semibold py-2 px-4 rounded-lg transition-colors text-sm">
                                + Início (unshift)
                            </button>
                        </div>
                    </div>
                </section>

                <section class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
                    <h2 class="text-xl font-bold mb-4 flex items-center text-slate-800">
                        <span class="bg-red-100 text-red-700 px-2 py-1 rounded text-sm mr-2">2</span> 
                        Remover Aluno
                    </h2>
                    <div class="flex gap-2">
                        <button onclick="removerFim()" class="flex-1 bg-red-500 hover:bg-red-600 text-white font-semibold py-2 px-4 rounded-lg transition-colors text-sm">
                            - Remover Fim (pop)
                        </button>
                        <button onclick="removerInicio()" class="flex-1 bg-red-400 hover:bg-red-500 text-white font-semibold py-2 px-4 rounded-lg transition-colors text-sm">
                            - Remover Início (shift)
                        </button>
                    </div>
                </section>

                <section class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
                    <h2 class="text-xl font-bold mb-4 flex items-center text-slate-800">
                        <span class="bg-purple-100 text-purple-700 px-2 py-1 rounded text-sm mr-2">3</span> 
                        Analisar Dados
                    </h2>
                    <div class="space-y-3">
                        <button onclick="transformarMap()" class="w-full bg-purple-100 hover:bg-purple-200 text-purple-800 font-semibold py-2 px-4 rounded-lg transition-colors border border-purple-200">
                            Resumir Nomes e Cursos (map)
                        </button>
                        
                        <div class="flex gap-2">
                            <input type="number" id="filtroSemestre" placeholder="A partir do Semestre..." class="w-full p-2 border border-slate-300 rounded-lg outline-none">
                            <button onclick="filtrarAlunos()" class="w-full bg-purple-100 hover:bg-purple-200 text-purple-800 font-semibold py-2 px-4 rounded-lg transition-colors border border-purple-200">
                                Filtrar (filter)
                            </button>
                        </div>
                        
                        <button onclick="somarSemestres()" class="w-full bg-purple-100 hover:bg-purple-200 text-purple-800 font-semibold py-2 px-4 rounded-lg transition-colors border border-purple-200">
                            Somar todos os Semestres (reduce)
                        </button>
                    </div>
                </section>

            </div>

            <div class="lg:col-span-7 space-y-6">
                
                <div id="caixaResultado" class="hidden bg-indigo-50 border-l-4 border-indigo-500 p-4 rounded-r-lg shadow-sm">
                    <h3 class="text-indigo-800 font-bold mb-1">Resultado:</h3>
                    <p id="displayResultado" class="text-indigo-900 whitespace-pre-line text-sm"></p>
                </div>

                <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200 h-full">
                    <div class="flex justify-between items-center mb-4">
                        <h2 class="text-xl font-bold text-slate-800">Lista Atual (Vetor Original)</h2>
                        <span id="contadorAlunos" class="bg-slate-200 text-slate-700 py-1 px-3 rounded-full text-sm font-bold">0 Alunos</span>
                    </div>
                    
                    <ul id="listaAlunos" class="space-y-3">
                        <li class="text-slate-400 italic text-center py-8">
                            Nenhum aluno cadastrado. Adicione alunos ao lado!
                        </li>
                    </ul>
                </div>

            </div>
        </div>
    </div>

    
</body>
</html>
