<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Atividade prática</title>
</head>
<body>

    <h1>Atividade prática - Funções JS</h1>
    <hr>

    <h3>1. Saudação</h3>
    <input type="text" id="inputNome" placeholder="Digite seu nome">
    <button onclick="mostrarNome()">Mostrar Nome</button>
    <hr>

    <h3>2. Área do Triângulo</h3>
    <input type="number" id="inputBase" placeholder="Base">
    <input type="number" id="inputAltura" placeholder="Altura">
    <button onclick="calcularAreaTriangulo()">Calcular Área</button>
    <hr>

    <h3>3. Idade em Dias</h3>
    <input type="number" id="inputIdadeDias" placeholder="Idade em anos">
    <button onclick="calcularIdadeDias()">Calcular Dias</button>
    <hr>

    <h3>4. Converter Idade</h3>
    <input type="number" id="inputIdadeConv" placeholder="Idade em anos">
    <button onclick="converterIdade()">Converter</button>
    <hr>

    <h3>5. Média Escolar</h3>
    <input type="number" id="inputNota1" placeholder="Nota 1">
    <input type="number" id="inputNota2" placeholder="Nota 2">
    <input type="number" id="inputNota3" placeholder="Nota 3">
    <button onclick="calcularMedia()">Calcular Média</button>
    <hr>

    <h3>6. Calcular Desconto</h3>
    <input type="number" id="inputPreco" placeholder="Preço (R$)">
    <input type="number" id="inputDesconto" placeholder="Desconto (%)">
    <button onclick="calcularDesconto()">Aplicar Desconto</button>
    <hr>

    <h3>7. Tabuada</h3>
    <input type="number" id="inputTabuada" placeholder="Número">
    <button onclick="tabuada()">Gerar Tabuada</button>
    <hr>

    <h3>8. Metros para Centímetros</h3>
    <input type="number" id="inputMetros" placeholder="Metros">
    <button onclick="converterMedida()">Converter</button>
    
</body>
<script src="script.js"></script>
</html>
